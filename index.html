<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY SOFTWARE | Ultimate Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .neon-border { border: 1px solid rgba(168, 85, 247, 0.4); transition: all 0.3s ease; }
        .neon-border:hover { border-color: #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.2); }
        .purple-glow { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        .btn-purple { background: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); transition: all 0.2s; }
        .btn-purple:hover { transform: scale(1.05); background: #bc77ff; }
        
        /* Modal Style */
        #discordModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    </style>
</head>
<body class="antialiased">

    <div id="discordModal">
        <div class="bg-zinc-900 p-8 rounded-2xl border border-purple-500 max-w-sm w-full mx-4 text-center">
            <div class="text-5xl mb-4">🚀</div>
            <h3 class="text-xl font-bold mb-2">Satın Alım İçin</h3>
            <p class="text-gray-400 mb-6">Lütfen Discord sunucumuza gelin. Yetkililer size yardımcı olacaktır.</p>
            <a href="https://discord.gg/gqzwb3Uwmk" target="_blank" class="btn-purple block w-full py-3 rounded-xl font-bold mb-3">DİSCORD'A GİT</a>
            <button onclick="closeModal()" class="text-zinc-500 hover:text-white text-sm uppercase tracking-widest">Kapat</button>
        </div>
    </div>

    <nav class="flex justify-between items-center p-6 max-w-6xl mx-auto">
        <div class="text-2xl font-black tracking-tighter purple-glow">SKY SOFTWARE</div>
        <div class="space-x-8 text-sm font-medium text-gray-400 hidden md:flex">
            <a href="#" class="hover:text-white transition">ANA SAYFA</a>
            <a href="#products" class="hover:text-white transition">ÜRÜNLER</a>
            <a href="https://discord.gg/gqzwb3Uwmk" class="hover:text-white transition">DESTEK</a>
        </div>
        <a href="https://discord.gg/gqzwb3Uwmk" class="btn-purple px-6 py-2 rounded-lg font-bold text-sm">DISCORD</a>
    </nav>

    <header class="text-center py-20 px-4">
        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tight uppercase">
            ULTIMATE <br> <span class="text-purple-500">PRECISION.</span>
        </h1>
        <p class="text-gray-400 max-w-xl mx-auto mb-10 text-lg">Hızlı, güvenilir ve modern otomasyon çözümleri.</p>
        <div class="flex justify-center gap-4">
            <a href="#products" class="btn-purple px-10 py-4 rounded-xl font-bold uppercase tracking-widest">Ürünleri Gör</a>
        </div>
    </header>

    <main id="products" class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <script>
                const products = [
                    { name: "SonOyuncu Farm Bot (1dk)", time: "3 Günlük", price: "250 ₺", icon: "🤖", tag: "POPÜLER" },
                    { name: "SonOyuncu Farm Bot (2.30dk)", time: "3 Günlük", price: "150 ₺", icon: "⚙️" },
                    { name: "SonOyuncu Çiftçi Bot", time: "3 Günlük", price: "50 ₺", icon: "👨‍🌾" },
                    { name: "RE Requiem (RE9)", time: "Global Key", price: "2 $", icon: "☣️", tag: "YENİ" },
                    { name: "Discord Double Counter Bypass", time: "LifeTime", price: "2 $", icon: "🛡️" },
                    { name: "Rocket League LagSwitch", time: "Haftalık", price: "10 $", icon: "⚡" },
                    { name: "Rocket League AI Bot", time: "-", price: "YAKINDA", icon: "🏎️", status: "soon" },
                    { name: "Capcut Pro Bypass", time: "LifeTime", price: "3 $", icon: "🎬" },
                    { name: "Steam All Games Bypass", time: "LifeTime", price: "20 $", icon: "👑" },
                    { name: "Steam Offline Account", time: "Tüm Oyunlar", price: "5 $", icon: "🎮", tag: "YENİ" }
                ];

                document.write(products.map(p => `
                    <div class="bg-zinc-900/50 p-6 rounded-2xl neon-border relative group">
                        ${p.tag ? `<div class="absolute top-4 right-4 bg-purple-500 text-[10px] font-bold px-2 py-1 rounded italic">${p.tag}</div>` : ''}
                        <div class="w-full h-32 bg-zinc-800/50 rounded-xl mb-4 flex items-center justify-center text-4xl group-hover:scale-110 transition duration-300">
                           ${p.icon}
                        </div>
                        <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                        <p class="text-zinc-500 text-xs mb-4 uppercase tracking-widest">${p.time}</p>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-xl font-black text-purple-400">${p.price}</span>
                            <button onclick="${p.status === 'soon' ? '' : 'openModal()'}" 
                                    class="${p.status === 'soon' ? 'bg-zinc-800 text-zinc-500 cursor-not-allowed' : 'bg-white text-black hover:bg-purple-500 hover:text-white'} px-4 py-2 rounded-lg font-bold text-xs transition">
                                ${p.status === 'soon' ? 'YAKINDA' : 'SATIN AL'}
                            </button>
                        </div>
                    </div>
                `).join(''));

                function openModal() { document.getElementById('discordModal').style.display = 'flex'; }
                function closeModal() { document.getElementById('discordModal').style.display = 'none'; }
            </script>

        </div>
    </main>

    <footer class="text-center py-10 border-t border-zinc-900 text-zinc-600 text-sm">
        &copy; 2024 SKY SOFTWARE - Tüm Hakları Saklıdır.
    </footer>
</body>
</html>
